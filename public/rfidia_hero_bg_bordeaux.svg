<svg width="100%" viewBox="0 0 1200 750" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Background hero bordeaux RFIDIA</title>
  <desc>Background hero avec fond bordeaux, texture points et effets lumineux radiaux</desc>

  <defs>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#C2185B" opacity="0.25"/>
    </pattern>
    <radialGradient id="glowLeft" cx="20%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#C2185B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1E2A4A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#253764" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1E2A4A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTop" cx="60%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#2D3F6D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1E2A4A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="650" fill="#17254A"/>
  <rect width="1200" height="650" fill="#1E2A4A" opacity="0.75"/>
  <rect width="1200" height="650" fill="url(#dots)"/>
  <rect width="1200" height="650" fill="url(#glowLeft)"/>
  <rect width="1200" height="650" fill="url(#glowRight)"/>
  <rect width="1200" height="650" fill="url(#glowTop)"/>

  <circle cx="-30" cy="180" r="200" fill="none" stroke="#2D3F6D" stroke-width="60" opacity="0.15"/>
  <circle cx="1230" cy="520" r="220" fill="none" stroke="#253764" stroke-width="80" opacity="0.3"/>
  <circle cx="600" cy="-40" r="130" fill="none" stroke="#2D3F6D" stroke-width="50" opacity="0.12"/>

  <line x1="0" y1="650" x2="1200" y2="200" stroke="#2D3F6D" stroke-width="1" opacity="0.08"/>
  <line x1="0" y1="500" x2="900" y2="0" stroke="#2D3F6D" stroke-width="1" opacity="0.06"/>

  <rect width="1200" height="650" fill="#101A33" opacity="0.18"/>
  <ellipse cx="600" cy="325" rx="500" ry="280" fill="#2D3F6D" opacity="0.08"/>
</svg>
